[workspace]
resolver = "3"
members = ["game_core", "rust"]


[workspace.dependencies]
godot = {git = "https://github.com/godot-rust/gdext.git", rev = "c60c107992211f367d7fb564fb9892fdc1514bf5", features = ["api-4-6", "experimental-threads"]}
bytes = "1.10.1"
quinn = "0.11.8"
quinn-proto = "0.11.12"
rcgen = "0.13.2"
tokio = { version = "1.45.1", features = ["full"] }
async-channel = "2.3.1"
rkyv = "0.8.10"
hecs = "0.10.5"
console-subscriber = "0.4.1"